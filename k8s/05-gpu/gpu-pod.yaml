# Pod that requests 1 GPU and runs nvidia-smi (Project 5).
# Requires NVIDIA GPU Operator (or GPU-capable nodes) to be installed.
apiVersion: v1
kind: Pod
metadata:
  name: cuda-smi
  labels:
    app: cuda-smi
spec:
  restartPolicy: OnFailure
  containers:
    - name: cuda
      image: nvidia/cuda:12.0.0-base-ubuntu22.04
      command: ["nvidia-smi"]
      resources:
        limits:
          nvidia.com/gpu: 1
  # Optional: schedule on GPU node when using mixed clusters
  # nodeSelector:
  #   nvidia.com/gpu.present: "true"
