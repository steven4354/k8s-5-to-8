# Should be allowed and get sidecar injected (mutating)
apiVersion: v1
kind: Pod
metadata:
  name: allowed-1gpu
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: cuda
      image: nvidia/cuda:12.0.0-base-ubuntu22.04
      command: ["nvidia-smi"]
      resources:
        limits:
          nvidia.com/gpu: "1"
