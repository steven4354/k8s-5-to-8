# Inject sidecar into pods that request nvidia.com/gpu
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: gpu-mutating
webhooks:
  - name: gpu-mutating.example.com
    clientConfig:
      service:
        namespace: gpu-webhook
        name: gpu-webhook
        path: /mutate
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
