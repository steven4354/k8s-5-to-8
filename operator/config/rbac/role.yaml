apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inferencedeployment-operator-role
rules:
  - apiGroups: ["ml.example.com"]
    resources: ["inferencedeployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["ml.example.com"]
    resources: ["inferencedeployments/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: inferencedeployment-operator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: inferencedeployment-operator-role
subjects:
  - kind: ServiceAccount
    name: default
    namespace: default
